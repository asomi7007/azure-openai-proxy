server:
  port: 8081

azure:
  baseUrl: "https://claude-opus-4-5-resource-kr.services.ai.azure.com"
  openAIBaseUrl: "https://claude-opus-4-5-resource-kr.openai.azure.com"
  openAIApiVersion: "2024-05-01-preview"
  openAIResponsesApiVersion: "preview"
  # API key is loaded from .env.
  # API 키는 .env에서 로드합니다.

unsupportedParams:
  - prompt_cache_retention
  - prompt_cache_key

modelNameMap:
  # Claude Opus
  claude-opus-4-6: claude-opus-4-6
  claude-opus-4-5-20251101: claude-opus-4-5
  claude-opus-4-5-20250929: claude-opus-4-6
  # Claude Sonnet (이제 전용 배포 있음)
  claude-sonnet-4-6: claude-sonnet-4-6
  claude-sonnet-4-5: claude-sonnet-4-5
  claude-sonnet-4-5-20250929: claude-sonnet-4-5
  claude-sonnet-4-20250514: claude-sonnet-4-5
  # Claude Haiku (→ Sonnet으로 대체)
  claude-haiku-4-5-20251001: claude-sonnet-4-5
  # GPT
  gpt-5.2-chat: gpt-5.2-chat
  # Roo/OpenAI native alias observed in live requests → Azure codex deployment
  # Roo/OpenAI native 요청에서 관찰된 alias → Azure codex 배포
  gpt-5.1-codex-max: gpt-5.3-codex
  gpt-5.3-codex: gpt-5.3-codex
  gpt-5.4: gpt-5.4
  gpt-5.4-pro: gpt-5.4-pro

# Models that can use Azure Responses API natively without request/response reshaping.
# 요청/응답 변환 없이 Azure Responses API를 네이티브로 직접 사용할 수 있는 모델입니다.
# Uses openAIResponsesApiVersion as the api-version.
# api-version으로 openAIResponsesApiVersion을 사용합니다.
nativeResponsesModels:
  - gpt-5.3-codex
  - gpt-5.4-pro

# Models that must use the /completions endpoint instead of /chat/completions.
# /chat/completions 대신 /completions endpoint를 사용해야 하는 모델입니다.
completionsModels: []

# Models that trigger model-based rerouting into the Azure OpenAI path even when the incoming request is Anthropic-compatible.
# 들어오는 요청이 Anthropic 호환 형식이어도 Azure OpenAI 경로로 모델 기반 재라우팅되는 모델입니다.
openAIModels:
  - gpt-5.2-chat
  - gpt-5.3-codex
  - gpt-5.4
  - gpt-5.4-pro

unsupportedAnthropicBetas:
  - prompt-caching-2024-07-31
  - fine-grained-tool-streaming-2025-05-14
  - output-128k-2025-02-19
  - context-1m-2025-08-07

# Retry strategy for 429 handling.
# 429 재시도 전략 설정입니다.
retry:
  maxRetries: 4
  fallbackBaseSeconds: 45
  multiplier: 1.8
  maxSeconds: 240
  jitterRatio: 0.2
  # NoCapacity 감지 시 max_completion_tokens 축소 비율
  noCapacityDownscaleRatio: 0.6
  # NoCapacity 감지 시 축소 하한
  noCapacityMinTokens: 1024

# Failover strategy for NoCapacity handling.
# NoCapacity 처리용 failover 설정입니다.
failover:
  # Optional alternate Azure OpenAI endpoints (resource/region failover).
  # 선택: Azure OpenAI 엔드포인트 failover 목록
  openAIBaseUrls: []
  # Optional model deployment fallback chain.
  # 선택: 모델 배포 failover 체인
  modelFallbackMap:
    # keep quality first, then lower-load chat model
    gpt-5.4-pro:
      - gpt-5.4
      - gpt-5.2-chat
    gpt-5.4:
      - gpt-5.2-chat

# Adaptive max_completion_tokens based on request content size.
# 요청 내용량 기반 max_completion_tokens 동적 조정 설정입니다.
dynamicMaxCompletionTokens:
  enabled: true
  # Default context window used when model-specific value is absent.
  # 모델별 값이 없을 때 사용하는 기본 컨텍스트 윈도우
  defaultContextWindow: 1000000
  # Optional per-model context window overrides.
  # 선택: 모델별 컨텍스트 윈도우 오버라이드
  modelContextWindows:
    gpt-5.4: 1000000
    gpt-5.4-pro: 1000000
    gpt-5.2-chat: 1000000
  # Hard output bounds
  minOutputTokens: 1024
  maxOutputTokens: 32000
  # Recommended output ~= estimated_input_tokens * ratio
  outputToInputRatio: 1.2
  # Do not allocate too much of full context to output in one call.
  maxOutputShareOfContext: 0.12
  # Keep a context safety margin to avoid near-limit failures.
  safetyBufferTokens: 4096
  # Rough tokenizer heuristic (chars per token)
  charPerToken: 4
  # If client omits max tokens, set adaptive value automatically.
  applyWhenMissing: true
  # Request-type specific overrides (first match wins).
  # 요청 유형별 오버라이드 (먼저 매칭된 규칙 우선)
  requestTypeProfiles:
    - name: code-heavy
      keywords: ["code", "implement", "fix", "refactor", "테스트", "코드", "구현", "디버그"]
      outputToInputRatio: 2.2
      minOutputTokens: 2048
      maxOutputTokens: 64000
      maxOutputShareOfContext: 0.2
      safetyBufferTokens: 4096
    - name: summary-concise
      keywords: ["요약", "summary", "tl;dr", "brief", "간단히"]
      outputToInputRatio: 0.8
      minOutputTokens: 512
      maxOutputTokens: 8192
      maxOutputShareOfContext: 0.08
      safetyBufferTokens: 2048

# Model routing profiles selected through PROXY_MODEL_PROFILE.
# 환경변수 PROXY_MODEL_PROFILE로 선택하는 모델 라우팅 프로필입니다.
# - default: keep the base mapping behavior / 기본 매핑 동작 유지
# - claude-to-gpt: reroute Claude-style requests into Azure GPT deployments / Claude 요청을 Azure GPT 배포로 재라우팅
# - model-router: reroute Claude-style requests into the Azure model-router deployment / Claude 요청을 Azure model-router 배포로 재라우팅
modelProfiles:
  claude-to-gpt:
    modelNameMap:
      # Force Claude-style requests onto Azure OpenAI GPT deployments.
      # Claude 형식 요청도 Azure OpenAI GPT 배포로 강제 매핑합니다.
      claude-opus-4-6: gpt-5.4-pro
      claude-sonnet-4-6: gpt-5.4
      # OpenAI-family model IDs still follow the shared Azure OpenAI deployment mapping.
      # OpenAI 계열 모델 ID도 공통 Azure OpenAI 배포 매핑을 그대로 따릅니다.
    # Treat these resolved models as Azure OpenAI targets even for Anthropic-compatible input.
    # Anthropic 호환 입력이라도 이 리스트 모델로 해석되면 Azure OpenAI 경로로 자동 전환합니다.
    openAIModels:
      - gpt-5.4-pro
      - gpt-5.4

  model-router:
    modelNameMap:
      # Map Claude-style requests onto the Azure OpenAI model-router deployment.
      # Claude 형식 요청을 Azure OpenAI model-router 배포로 매핑합니다.
      claude-opus-4-6: model-router
      claude-sonnet-4-6: model-router
      claude-haiku-4-5-20251001: model-router
    # Include the model-router deployment in the Azure OpenAI target set.
    # model-router 배포를 Azure OpenAI 대상 집합에 포함합니다.
    openAIModels:
      - model-router
